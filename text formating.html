<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Text Formatting Tags</title>
</head>

<body>
    <h1>HTML Text Formatting Tags</h1>

    <h2>Bold Text</h2>
    <p>Example: <strong>This text is important!</strong></p>

    <h2>Italic Text</h2>
    <p>Example: <em>This text is emphasized!</em></p>

    <h2>Underlined Text</h2>
    <p>Example: <u>This text is underlined!</u></p>

    <h2>Strikethrough Text</h2>
    <p>Example: <s>This text is no longer valid!</s></p>

    <h2>Superscript Text</h2>
    <p>Example: E = mc<sup>2</sup></p>

    <h2>Subscript Text</h2>
    <p>Example: H<sub>2</sub>O</p>
</body>

</html>
